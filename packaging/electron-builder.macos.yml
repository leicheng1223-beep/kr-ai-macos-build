appId: com.kr.ai
productName: Kr ai

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - package.json
  - "!node_modules/better-sqlite3/build/Release/*.pdb"
  - "!resources/bridge-runtime/python/**"
  - "!resources/bridge-runtime/**/*.exe"
  - "!resources/bridge-runtime/**/*.dll"
  - "!resources/bridge-runtime/**/*.pyd"

asar: true
asarUnpack:
  - node_modules/better-sqlite3/build/Release/*.node

extraMetadata:
  main: dist-electron/main.js

extraResources:
  - from: resources/assets
    to: assets
  - from: resources/bridge
    to: bridge
  - from: resources/models
    to: models
  - from: resources/bridge-runtime/darwin-arm64
    to: bridge-runtime/darwin-arm64
    filter:
      - "**/*"
  - from: resources/bridge-runtime/darwin-x64
    to: bridge-runtime/darwin-x64
    filter:
      - "**/*"

nodeGypRebuild: false
npmRebuild: false
buildDependenciesFromSource: false
forceCodeSigning: false
publish: null

mac:
  category: public.app-category.graphics-design
  icon: build/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: packaging/entitlements.mac.plist
  entitlementsInherit: packaging/entitlements.mac.inherit.plist
  extendInfo:
    NSAppleEventsUsageDescription: Kr ai may request access when opening user-selected files or folders.
    NSDocumentsFolderUsageDescription: Kr ai reads and writes user-selected image outputs.
    NSDownloadsFolderUsageDescription: Kr ai can save generated images to user-selected download folders.
    NSDesktopFolderUsageDescription: Kr ai can read and write user-selected desktop files.
    NSPhotoLibraryUsageDescription: Kr ai can read user-selected image references.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

zip:
  artifactName: ${productName}-${version}-${arch}.${ext}

compression: normal
